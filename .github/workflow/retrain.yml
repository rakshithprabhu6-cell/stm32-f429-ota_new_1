name: Retrain OTA
on:
  workflow_dispatch:
  push:
    paths:
      - 'corrections/**'
concurrency:
  group: retrain
  cancel-in-progress: true
jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1
        run: python train1.py

      - name: Upload model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: model/mnist.keras
          retention-days: 30
