name: Retrain OTA

on:
  workflow_dispatch:
  push:
    paths:
      - 'corrections/**'

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install tensorflow numpy

      - name: Train
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1
        run: python train1.py

      - name: Upload model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: model/mnist.keras